<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Home Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════
   HOME HUB — Quiet residential redesign
   Type:  Manrope (body) + Instrument Serif italic (editorial)
   Tone:  warm parchment + cream, terracotta accent, sage second
   ═══════════════════════════════════════════════════════════ */
:root {
  /* surfaces — warm parchment family */
  --bg:#EFE7D7;
  --bg2:#E5DCC8;
  --surface:#FBF6EC;
  --s2:#F2EBD9;

  /* lines + ink */
  --border:#DCD0B8;
  --border-2:#C5B89E;
  --text:#26201A;
  --text2:#6B5E4D;
  --text3:#A1937D;

  /* accents — palette set by Tweaks */
  --accent:#C0664A;        /* terracotta */
  --acc2:#D88766;
  --accbg:#F2DDCD;
  --accent-ink:#7A3A22;

  /* secondary semantic */
  --green:#6F8A5C; --greenbg:#DCE4CE; --green-ink:#3F5A2D;
  --red:#B65555;   --redbg:#EFD4CF;   --red-ink:#7A2D2D;
  --yellow:#A57A2C;--yellowbg:#ECDDB6;--yellow-ink:#5C4612;

  /* radii + motion */
  --r:18px; --rsm:12px; --rxs:9px; --rlg:24px;
  --sh-1:0 1px 0 rgba(60,42,20,.04), 0 1px 2px rgba(60,42,20,.05);
  --sh-2:0 1px 0 rgba(60,42,20,.04), 0 8px 22px -10px rgba(60,42,20,.18);
  --sh-3:0 30px 60px -28px rgba(60,42,20,.30);
  --ease:cubic-bezier(.22,1,.36,1);
  --serif:'Instrument Serif', 'Cormorant Garamond', serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
[data-dark]{
  --bg:#1B1714; --bg2:#221D18; --surface:#2A231D; --s2:#332B23;
  --border:#3D3328; --border-2:#52453A;
  --text:#F2EAD9; --text2:#BFAE93; --text3:#8A7B65;
  --accbg:#3D2014; --greenbg:#1F2A18; --redbg:#321B1B; --yellowbg:#322813;
}

/* accent palette swap (set by Tweaks) */
:root[data-palette="terracotta"]{ --accent:#C0664A; --acc2:#D88766; --accbg:#F2DDCD; --accent-ink:#7A3A22; }
:root[data-palette="sage"]      { --accent:#7A8A6F; --acc2:#9AA888; --accbg:#DDE3D2; --accent-ink:#3E4D34; }
:root[data-palette="ocean"]     { --accent:#4F7585; --acc2:#7A9AA8; --accbg:#D4E0E5; --accent-ink:#234451; }
:root[data-palette="plum"]      { --accent:#7C546A; --acc2:#A47E92; --accbg:#E6D4DC; --accent-ink:#4A2A3B; }
:root[data-palette="amber"]     { --accent:#C8893D; --acc2:#E0AB68; --accbg:#F4E2C7; --accent-ink:#7A4F1B; }
:root[data-palette="rose"]      { --accent:#B8556A; --acc2:#D17E91; --accbg:#F2D6DD; --accent-ink:#732838; }
:root[data-palette="forest"]    { --accent:#3F6B4E; --acc2:#6B9075; --accbg:#CFDDD0; --accent-ink:#1F3D2A; }
:root[data-palette="navy"]      { --accent:#3A4A6E; --acc2:#6B7A99; --accbg:#D2D8E2; --accent-ink:#1B2542; }
:root[data-palette="mustard"]   { --accent:#A88A1F; --acc2:#C4A94B; --accbg:#EFE5BC; --accent-ink:#5E4A0A; }
:root[data-palette="rust"]      { --accent:#A24A2C; --acc2:#C46F50; --accbg:#EFCFBE; --accent-ink:#62240F; }
:root[data-palette="lilac"]     { --accent:#7E6BA8; --acc2:#A797C8; --accbg:#E0D8EC; --accent-ink:#48386F; }
:root[data-palette="charcoal"]  { --accent:#3E3833; --acc2:#6E6660; --accbg:#D6CFC6; --accent-ink:#1A1714; }
:root[data-palette="teal"]      { --accent:#2F7B7A; --acc2:#5DA1A0; --accbg:#C8DFDE; --accent-ink:#134847; }
:root[data-palette="sand"]      { --accent:#9C7B58; --acc2:#BFA17E; --accbg:#E8DAC4; --accent-ink:#5C4528; }
:root[data-palette="taupe"]     { --accent:#8C7A6A; --acc2:#B0A092; --accbg:#E5DDD2; --accent-ink:#4E4137; }
:root[data-palette="stone"]     { --accent:#7A7268; --acc2:#A29A8E; --accbg:#DDD7CE; --accent-ink:#3F3A33; }
:root[data-palette="linen"]     { --accent:#A89880; --acc2:#C7B9A4; --accbg:#EFE7D8; --accent-ink:#5F503D; }
:root[data-palette="pearl"]     { --accent:#9A938A; --acc2:#C0B9B0; --accbg:#E6E1DA; --accent-ink:#4D4842; }
/* pastel accents — accent stays usable, accbg is the soft pastel hue */
:root[data-palette="vanilla"]   { --accent:#C9B560; --acc2:#DCC97A; --accbg:#FFFEE9; --accent-ink:#6B5A18; }
:root[data-palette="mist"]      { --accent:#4FA8B5; --acc2:#7CC1CC; --accbg:#E9FBFF; --accent-ink:#1F575F; }
:root[data-palette="sky"]       { --accent:#5B82C8; --acc2:#86A4D7; --accbg:#E8F2FE; --accent-ink:#27437A; }
:root[data-palette="blush"]     { --accent:#C99987; --acc2:#DBB4A5; --accbg:#FCF6F4; --accent-ink:#7A4E3D; }
:root[data-palette="powder"]    { --accent:#5D7AA8; --acc2:#8499BD; --accbg:#EAF1FB; --accent-ink:#293F66; }
:root[data-palette="butter"]    { --accent:#D4B135; --acc2:#E2C460; --accbg:#FFF6CD; --accent-ink:#75591A; }
:root[data-palette="pistachio"] { --accent:#8E9A56; --acc2:#ABB67A; --accbg:#F0F2DC; --accent-ink:#4D5524; }
:root[data-palette="lemon"]     { --accent:#D9B73B; --acc2:#E5C865; --accbg:#FFF3C9; --accent-ink:#7A5F0F; }
:root[data-palette="snow"]      { --accent:#A09D97; --acc2:#C2BFB9; --accbg:#FFFFFF; --accent-ink:#4D4A45; }

/* surface tone overrides (background lightness) */
:root[data-surface="ivory"]   { --bg:#F5EFE3; --bg2:#ECE5D5; --surface:#FCFAF3; --s2:#F4ECDB; }
:root[data-surface="snow"]    { --bg:#F8F4EC; --bg2:#EFEAE0; --surface:#FFFDF7; --s2:#F6F0E2; }
:root[data-surface="cream"]   { --bg:#FAF4E6; --bg2:#F2EBD8; --surface:#FFFBF0; --s2:#F8F1DE; }
:root[data-surface="paper"]   { --bg:#FBFAF6; --bg2:#F2F0E8; --surface:#FFFFFC; --s2:#F7F4EC; }
:root[data-surface="white"]   { --bg:#F4F4F4; --bg2:#EAEAEA; --surface:#FFFFFF; --s2:#F7F7F7; }
:root[data-surface="vanilla"] { --bg:#FBF9DC; --bg2:#F1EFCB; --surface:#FFFEE9; --s2:#F7F5D6; }
:root[data-surface="mintsky"] { --bg:#DEF5F8; --bg2:#CAEAEE; --surface:#E9FBFF; --s2:#D6F1F5; }
:root[data-surface="sky"]     { --bg:#DBE8FA; --bg2:#C9DCF3; --surface:#E8F2FE; --s2:#D2E3F7; }
:root[data-surface="blush"]   { --bg:#F6EBE6; --bg2:#EEDFD7; --surface:#FCF6F4; --s2:#F2E4DD; }
:root[data-surface="powder"]  { --bg:#DCE7F4; --bg2:#CCDAEC; --surface:#EAF1FB; --s2:#D5E1F0; }
:root[data-surface="butter"]  { --bg:#FAEDB0; --bg2:#F1E29D; --surface:#FFF6CD; --s2:#F6E9B5; }
:root[data-surface="pistachio"]{--bg:#E2E5C0; --bg2:#D4D8AE; --surface:#F0F2DC; --s2:#E6E9C8; }
:root[data-surface="lemon"]   { --bg:#FAEAA8; --bg2:#F2DF96; --surface:#FFF3C9; --s2:#F7E8B0; }
[data-dark][data-surface="white"],[data-dark][data-surface="vanilla"],[data-dark][data-surface="mintsky"],[data-dark][data-surface="sky"],[data-dark][data-surface="blush"],[data-dark][data-surface="powder"],[data-dark][data-surface="butter"],[data-dark][data-surface="pistachio"],[data-dark][data-surface="lemon"]{
  --bg:#1B1714; --bg2:#221D18; --surface:#2A231D; --s2:#332B23;
}
[data-dark][data-surface="ivory"],[data-dark][data-surface="snow"],[data-dark][data-surface="cream"],[data-dark][data-surface="paper"]{
  --bg:#1B1714; --bg2:#221D18; --surface:#2A231D; --s2:#332B23;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  font-family:'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings:'ss01','cv11';
  letter-spacing:-0.005em;
  color:var(--text);min-height:100vh;overflow-x:hidden;
  background:
    radial-gradient(900px 600px at 90% -10%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 60%),
    radial-gradient(700px 500px at -10% 110%, color-mix(in oklab, var(--accent) 8%, transparent), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--border-2);background-clip:padding-box;border:2px solid transparent}

::selection{background:var(--accent);color:#fff}
button,input,select,textarea{font-family:inherit;color:inherit}
button{cursor:pointer}

/* ── Layout ── */
#app{display:flex;flex-direction:column;min-height:100vh;max-width:1140px;margin:0 auto;padding:0 14px}
#content{flex:1;padding:6px 0 140px;overflow-y:auto}

/* ── Top Bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;margin:14px 0 6px;
  background:color-mix(in oklab, var(--surface) 80%, transparent);
  backdrop-filter:saturate(140%) blur(14px); -webkit-backdrop-filter:saturate(140%) blur(14px);
  border:1px solid var(--border);
  border-radius:999px;
  position:sticky;top:14px;z-index:100;gap:12px;
  box-shadow:var(--sh-1);
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-ico{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-family:var(--serif);font-style:italic;font-size:18px;font-weight:400;
  box-shadow:inset 0 -8px 16px rgba(0,0,0,.12), 0 2px 8px -2px color-mix(in oklab, var(--accent) 50%, transparent);
}
.brand-name{font-family:var(--serif);font-style:italic;font-size:1.45rem;font-weight:400;color:var(--text);letter-spacing:-.01em;line-height:1;white-space:nowrap}
.topbar-mid{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;gap:1px}
.topbar-date{font-size:.7rem;color:var(--text3);font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.topbar-time{font-family:var(--serif);font-style:italic;font-size:1.35rem;font-weight:400;color:var(--text);letter-spacing:-.02em;line-height:1;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.user-pill{
  display:flex;align-items:center;gap:7px;cursor:pointer;
  background:transparent;border:1px solid var(--border);
  border-radius:999px;padding:6px 12px 6px 6px;font-size:.78rem;font-weight:600;
  transition:all .2s var(--ease);
}
.user-pill:hover{border-color:var(--text2);background:var(--s2)}
.user-pill .av-tiny{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.admin-tag{background:var(--accent);color:#fff;border-radius:99px;padding:2px 8px;font-size:.62rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.signin-btn{
  background:var(--text);color:var(--surface);border:none;border-radius:999px;
  padding:8px 16px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px;transition:all .2s var(--ease);
}
.signin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px -8px rgba(0,0,0,.4)}
.icon-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);
}
.icon-btn:hover{background:var(--s2);color:var(--text);border-color:var(--text2)}

/* ── Bottom Nav ── */
.bottomnav{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:color-mix(in oklab, var(--surface) 92%, transparent);
  backdrop-filter:saturate(140%) blur(14px); -webkit-backdrop-filter:saturate(140%) blur(14px);
  border:1px solid var(--border);
  display:flex;height:62px;z-index:100;
  border-radius:999px;
  box-shadow:var(--sh-2);
  padding:6px;
  gap:2px;
  width:auto;max-width:calc(100% - 28px);
}
.navitem{
  flex:1;display:flex;align-items:center;justify-content:center;
  gap:8px;font-size:.78rem;font-weight:600;color:var(--text2);
  cursor:pointer;border:none;background:none;
  transition:all .2s var(--ease);
  padding:0 16px;border-radius:999px;
  min-width:50px;
}
.navitem:hover{color:var(--text);background:var(--s2)}
.navitem.on{color:var(--surface);background:var(--text)}
.navitem .navlabel{display:none}
@media(min-width:600px){ .navitem .navlabel{display:inline} }
.navico{font-size:18px;line-height:1}

/* ── Cards ── */
.card{
  background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
  padding:20px;box-shadow:var(--sh-1);
}
.card-sm{
  background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);
  padding:14px 16px;
}

/* ── Section header ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px;gap:12px}
.sh-title{font-family:var(--serif);font-style:italic;font-size:1.5rem;font-weight:400;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.sh-title-sm{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:'Manrope';font-style:normal}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 18px;border-radius:999px;border:1px solid transparent;
  font-size:.85rem;font-weight:600;letter-spacing:-.005em;
  cursor:pointer;transition:all .2s var(--ease);white-space:nowrap;
}
.btn-primary{background:var(--text);color:var(--surface)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(0,0,0,.4)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--s2);border-color:var(--text2)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-lg{padding:14px 24px;font-size:.95rem;border-radius:14px}
.btn-ghost{background:transparent;color:var(--text2);border:none}
.btn-ghost:hover{color:var(--text);background:var(--s2)}

/* ── Tags ── */
.tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:600;
  letter-spacing:-.005em;
  background:var(--s2);color:var(--text2);border:1px solid var(--border);
}
.tag-high{background:var(--redbg);color:var(--red-ink);border-color:transparent}
.tag-med{background:var(--yellowbg);color:var(--yellow-ink);border-color:transparent}
.tag-low{background:var(--greenbg);color:var(--green-ink);border-color:transparent}
.tag-done{background:var(--greenbg);color:var(--green-ink);border-color:transparent}
.tag-over{background:var(--redbg);color:var(--red-ink);border-color:transparent}

/* ── Task card ── */
.tcard{
  display:flex;align-items:flex-start;gap:14px;
  background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
  padding:16px 18px;margin-bottom:8px;position:relative;overflow:hidden;
  transition:all .2s var(--ease);cursor:default;
  box-shadow:var(--sh-1);
}
.tcard:hover{box-shadow:var(--sh-2);transform:translateY(-1px);border-color:var(--border-2)}
.tcard.done{opacity:.55}
.tcard.done .ttitle{text-decoration:line-through;text-decoration-thickness:1.5px;text-decoration-color:var(--text3)}
.tbar{position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0}
.tcheck{
  width:26px;height:26px;min-width:26px;border-radius:50%;
  border:1.5px solid var(--border-2);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .2s var(--ease);margin-top:1px;flex-shrink:0;
  color:transparent;
}
.tcheck.on{background:var(--green);border-color:var(--green);color:#fff}
.tcheck:hover:not(.on){border-color:var(--green);background:var(--greenbg);color:var(--green)}
.tbody{flex:1;min-width:0}
.ttitle{font-weight:600;font-size:.95rem;margin-bottom:5px;letter-spacing:-.01em}
.tmeta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:.74rem;color:var(--text3)}
.tactions{display:flex;align-items:center;gap:4px;margin-left:4px;opacity:.5;transition:opacity .2s}
.tcard:hover .tactions{opacity:1}

/* ── FAB ── */
.fab{
  position:fixed;bottom:96px;right:22px;
  width:56px;height:56px;border-radius:50%;
  background:var(--text);color:var(--surface);border:none;
  font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 28px -10px rgba(0,0,0,.4), 0 4px 10px -4px rgba(0,0,0,.2);
  z-index:200;transition:all .2s var(--ease);
}
.fab:hover{transform:scale(1.06) translateY(-2px)}
.fab:active{transform:scale(.95)}

/* ── Member avatar ── */
.av{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-weight:600;
  background:var(--s2);
}
.av-md{width:36px;height:36px;font-size:18px}
.av-sm{width:26px;height:26px;font-size:13px}
.av-lg{width:52px;height:52px;font-size:24px}

/* ── Progress bar ── */
.pbar-wrap{background:var(--bg2);border-radius:99px;overflow:hidden;height:6px}
.pbar-fill{height:100%;border-radius:99px;transition:width .6s var(--ease);background:var(--accent)}

/* ── Modal ── */
.modal-bg{
  position:fixed;inset:0;
  background:color-mix(in oklab, var(--text) 40%, transparent);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  z-index:500;display:flex;align-items:flex-end;
  animation:fadeIn .2s ease;
}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal{
  background:var(--surface);border-radius:24px 24px 0 0;padding:24px 22px 32px;
  width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s var(--ease);
  border:1px solid var(--border);border-bottom:none;
}
@media(min-width:600px){
  .modal{max-width:540px;margin:0 auto;border-radius:24px;border-bottom:1px solid var(--border);animation:scaleIn .25s var(--ease);box-shadow:var(--sh-3)}
}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-family:var(--serif);font-style:italic;font-size:1.65rem;font-weight:400;letter-spacing:-.01em}
.modal-close{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal-close:hover{background:var(--s2);color:var(--text)}

/* ── Form ── */
.fgroup{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.flabel{font-size:.72rem;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.finput,.fselect,.ftextarea{
  width:100%;padding:12px 14px;border-radius:12px;
  border:1px solid var(--border);background:var(--s2);
  color:var(--text);font-family:inherit;font-size:.92rem;
  outline:none;transition:all .15s;
}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:var(--text);background:var(--surface);box-shadow:0 0 0 3px color-mix(in oklab, var(--text) 8%, transparent)}
.ftextarea{resize:vertical;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.frow{grid-template-columns:1fr}}
.pill-select{display:flex;flex-wrap:wrap;gap:6px}
.ps-pill{
  padding:7px 14px;border-radius:999px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .2s var(--ease);
}
.ps-pill:hover{border-color:var(--text2);color:var(--text)}
.ps-pill.on{background:var(--text);border-color:var(--text);color:var(--surface)}
.day-btn{
  width:42px;height:42px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:.74rem;font-weight:700;cursor:pointer;transition:all .15s;
}
.day-btn:hover{border-color:var(--text2);color:var(--text)}
.day-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Side panel ── */
.panel-bg{position:fixed;inset:0;background:color-mix(in oklab, var(--text) 35%, transparent);z-index:400;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.panel{
  position:fixed;top:0;right:0;bottom:0;width:min(360px,92vw);
  background:var(--surface);z-index:401;overflow-y:auto;
  box-shadow:-20px 0 60px -20px rgba(0,0,0,.25);
  animation:slideInR .3s var(--ease);display:flex;flex-direction:column;
  border-left:1px solid var(--border);
}
.panel-hdr{
  padding:22px 22px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.panel-title{font-family:var(--serif);font-style:italic;font-size:1.45rem;font-weight:400;letter-spacing:-.01em}
.panel-body{padding:18px 22px}
.ucard{
  display:flex;align-items:center;gap:14px;padding:14px;
  border-radius:14px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;margin-bottom:8px;transition:all .2s var(--ease);
}
.ucard:hover{border-color:var(--text2);transform:translateY(-1px);box-shadow:var(--sh-1)}
.ucard.active-user{border-color:var(--accent);background:var(--accbg)}
.pin-dots{display:flex;gap:14px;justify-content:center}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border-2);background:transparent;transition:all .15s}
.pin-dot.on{background:var(--accent);border-color:var(--accent)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pin-key{
  aspect-ratio:1;border-radius:14px;border:1px solid var(--border);
  background:var(--s2);font-family:var(--serif);font-style:italic;font-size:1.5rem;font-weight:400;
  color:var(--text);cursor:pointer;transition:all .12s var(--ease);
  display:flex;align-items:center;justify-content:center;
}
.pin-key:hover{background:var(--surface);transform:scale(1.04);border-color:var(--text2)}
.pin-key:active{transform:scale(.94)}

/* ══ HOME HERO ══════════════════════════════════════════════ */
.hero{
  position:relative;
  margin:8px 0 18px;
  padding:32px 28px 28px;
  border-radius:var(--rlg);
  background:
    radial-gradient(600px 300px at 100% 0%, color-mix(in oklab, var(--accent) 18%, transparent), transparent 70%),
    var(--surface);
  border:1px solid var(--border);
  box-shadow:var(--sh-1);
  overflow:hidden;
}
.hero-ornament{
  position:absolute;right:-40px;top:-40px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, color-mix(in oklab, var(--accent) 38%, transparent), transparent 70%);
  pointer-events:none;
}
.hero-eyebrow{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.hero-greet{font-family:var(--serif);font-style:italic;font-size:clamp(2rem, 5vw, 3rem);font-weight:400;line-height:1.05;letter-spacing:-.015em;color:var(--text);margin-bottom:6px}
.hero-greet em{font-style:italic;color:var(--accent)}
.hero-sub{font-size:.95rem;color:var(--text2);max-width:520px;line-height:1.5}
.hero-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.stat-chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px 8px 10px;border-radius:999px;
  background:color-mix(in oklab, var(--bg) 50%, transparent);
  border:1px solid var(--border);
  font-size:.8rem;font-weight:600;
}
.stat-chip .chip-num{font-family:var(--serif);font-style:italic;font-size:1.05rem;color:var(--text);font-weight:400}
.stat-chip .chip-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.stat-chip.warn{background:var(--redbg);color:var(--red-ink);border-color:transparent}
.stat-chip.warn .chip-dot{background:var(--red)}

/* ── Member chips (calendar filter) ── */
.sky-member-chips{display:flex;gap:8px;overflow-x:auto;padding:8px 0 4px;scrollbar-width:none}
.sky-member-chips::-webkit-scrollbar{display:none}
.sky-chip{
  display:flex;align-items:center;gap:8px;padding:6px 14px 6px 6px;
  border-radius:999px;font-size:.8rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--text2);
  white-space:nowrap;transition:all .2s var(--ease);
}
.sky-chip:hover{border-color:var(--text2);color:var(--text)}
.sky-chip.active{border-color:transparent}
.sky-chip-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}

/* ── Calendar week grid (preserved structure, refined visuals) ── */
.sky-week-header{display:grid;gap:0;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5}
.sky-day-hdr{text-align:center;padding:10px 4px 8px;border-right:1px solid var(--border)}
.sky-day-hdr:last-child{border-right:none}
.sky-day-name{font-size:.62rem;font-weight:700;text-transform:uppercase;color:var(--text3);letter-spacing:.1em;margin-bottom:4px}
.sky-day-num{
  width:32px;height:32px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-style:italic;font-size:1.2rem;font-weight:400;
  cursor:pointer;transition:all .2s var(--ease);
}
.sky-day-num.today{background:var(--accent);color:#fff}
.sky-day-num:hover:not(.today){background:var(--s2)}
.sky-grid-wrap{display:flex;overflow-y:visible;position:relative}
.sky-time-col{width:52px;min-width:52px;flex-shrink:0}
.sky-time-label{display:flex;align-items:flex-start;justify-content:flex-end;padding-right:10px;padding-top:4px;font-size:.62rem;font-weight:600;color:var(--text3);border-right:1px solid var(--border);letter-spacing:.04em}
.sky-day-cols{display:grid;flex:1;border-top:1px solid var(--border)}
.sky-day-col{border-right:1px solid var(--border);position:relative;min-width:0}
.sky-day-col:last-child{border-right:none}
.sky-hour-row{border-bottom:1px solid var(--border);position:relative}
.sky-hour-row::after{content:'';position:absolute;left:0;right:0;top:50%;border-bottom:1px dashed var(--border);opacity:.5}
.sky-event{
  position:absolute;left:3px;right:3px;border-radius:8px;padding:6px 8px;
  font-size:.7rem;overflow:hidden;cursor:pointer;
  transition:all .15s var(--ease);z-index:2;
  border:1px solid transparent;
}
.sky-event:hover{transform:translateY(-1px);box-shadow:0 6px 16px -8px rgba(0,0,0,.2);z-index:3}
.sky-event-title{font-weight:700;line-height:1.25;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.72rem}
.sky-event-time{font-size:.62rem;opacity:.78;font-weight:500;letter-spacing:.01em}
.sky-event-av{position:absolute;bottom:5px;right:5px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(255,255,255,.6)}
.sky-allday-row{display:grid;gap:0;border-bottom:1px solid var(--border);background:var(--s2)}
.sky-allday-cell{padding:4px 5px;border-right:1px solid var(--border);min-height:24px}
.sky-allday-cell:last-child{border-right:none}
.sky-allday-ev{border-radius:6px;padding:3px 8px;font-size:.68rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.sky-now-line{position:absolute;left:0;right:0;z-index:4;height:1.5px;background:var(--accent);pointer-events:none}
.sky-now-line::before{content:'';position:absolute;left:-5px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px color-mix(in oklab, var(--accent) 25%, transparent)}
@media(max-width:540px){
  .sky-week-header,.sky-day-cols{grid-template-columns:repeat(3,1fr)!important}
  .sky-day-hdr:nth-child(n+5),.sky-day-col:nth-child(n+4){display:none}
}

/* ── Calendar (legacy classes used in routines/events) ── */
.cal-wrap{margin-top:16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-title{font-family:var(--serif);font-style:italic;font-size:1.4rem;font-weight:400}
.cal-nav-btn{background:none;border:1px solid var(--border);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:hover{color:var(--text);border-color:var(--text2)}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.month-hdr{text-align:center;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:6px 0}
.month-day{
  min-height:64px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);padding:6px;cursor:pointer;
  transition:all .2s var(--ease);
}
.month-day:hover{background:var(--s2);border-color:var(--text2)}
.month-day.today{border-color:var(--accent);background:var(--accbg)}
.month-day.other-month{opacity:.35}
.mday-num{font-family:var(--serif);font-style:italic;font-size:1.05rem;font-weight:400;margin-bottom:3px}

/* Event card (legacy) */
.evcard{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface);margin-bottom:8px}
.evstripe{width:3px;height:32px;border-radius:3px;flex-shrink:0}

/* ── Routine guide ── */
.guide-box{
  background:var(--accbg);border:1px solid var(--accent);
  border-radius:var(--r);padding:18px 20px;margin-bottom:16px;color:var(--accent-ink);
}
.code-row{font-family:var(--mono);font-size:.78rem;padding:3px 0;line-height:1.6}
.code-row strong{color:var(--accent-ink)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--surface);
  padding:13px 22px;border-radius:999px;
  font-weight:600;font-size:.88rem;z-index:600;
  animation:slideUp .25s var(--ease);
  white-space:nowrap;box-shadow:var(--sh-3);pointer-events:none;
}

/* ── Loading ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px}
.loading-ico{font-size:2.6rem;animation:pulse 1.4s ease infinite}

/* ── Confetti canvas ── */
#confetti-canvas{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none}

/* ── Settings ── */
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--surface);border-radius:14px;
  border:1px solid var(--border);margin-bottom:7px;
}
.setting-label{font-weight:600;font-size:.92rem}
.setting-val{font-size:.78rem;color:var(--text3);margin-top:2px}
.toggle{
  width:46px;height:26px;border-radius:99px;background:var(--border);
  position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;width:20px;height:20px;border-radius:50%;
  background:#fff;top:3px;left:3px;transition:transform .2s var(--ease);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(20px)}

/* ── Score banner ── */
.score-banner{
  background:var(--text);color:var(--surface);
  border-radius:var(--rlg);padding:24px 26px;
  display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.score-banner::before{
  content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle, color-mix(in oklab, var(--accent) 60%, transparent), transparent 70%);
}
.score-num{font-family:var(--serif);font-style:italic;font-size:2.4rem;font-weight:400}

/* ── Reward leaderboard ── */
.lb-item{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border-radius:var(--r);border:1px solid var(--border);
  padding:14px 16px;margin-bottom:8px;transition:all .2s var(--ease);
  box-shadow:var(--sh-1);
}
.lb-item:hover{transform:translateY(-1px);box-shadow:var(--sh-2)}
.lb-rank{font-family:var(--serif);font-style:italic;font-size:1.4rem;font-weight:400;min-width:32px;text-align:center;color:var(--text3)}
.lb-bar{background:var(--bg2);border-radius:99px;height:5px;margin-top:6px;overflow:hidden}
.pts-pill{
  background:var(--text);color:var(--surface);
  padding:6px 14px;border-radius:999px;font-weight:600;font-size:.85rem;
  white-space:nowrap;display:inline-flex;align-items:center;gap:5px;
}
.pts-pill .pts-num{font-family:var(--serif);font-style:italic;font-size:1.05rem;font-weight:400}

/* ── Kid mode ── */
.kid-header{padding:28px 22px;color:#fff;text-align:center;border-radius:var(--rlg);margin-bottom:18px;position:relative;overflow:hidden}
.kid-header::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% -20%, rgba(255,255,255,.25), transparent 50%);pointer-events:none}
.kid-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 0 90px}
@media(max-width:360px){.kid-grid{grid-template-columns:1fr}}
.kid-card{background:var(--surface);border-radius:22px;border:1px solid var(--border);padding:22px 18px;text-align:center;box-shadow:var(--sh-1);transition:all .2s var(--ease)}
.kid-card:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}
.kid-card.done{border-color:var(--green);background:var(--greenbg)}
.kid-ico{font-size:2.8rem;margin-bottom:10px;line-height:1}
.kid-title{font-family:var(--serif);font-style:italic;font-size:1.3rem;font-weight:400;margin-bottom:6px;letter-spacing:-.01em}
.kid-time{font-size:.78rem;color:var(--text3);font-weight:600;margin-bottom:12px}
.kid-pts{display:inline-flex;align-items:center;gap:5px;background:var(--yellowbg);color:var(--yellow-ink);padding:4px 12px;border-radius:99px;font-weight:700;font-size:.76rem;margin-bottom:12px}
.kid-done-btn{
  width:100%;padding:14px;border-radius:14px;border:none;
  background:var(--text);color:var(--surface);
  font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;
  transition:all .2s var(--ease);
}
.kid-done-btn:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}

/* ── Empty state ── */
.empty{text-align:center;padding:56px 24px;color:var(--text3)}
.empty-ico{font-size:3rem;margin-bottom:12px;opacity:.7}
.empty-title{font-family:var(--serif);font-style:italic;font-size:1.5rem;color:var(--text);margin-bottom:6px}

/* ── Tweaks panel ── */
.tweaks{
  position:fixed;right:18px;top:90px;width:280px;z-index:300;
  background:var(--surface);border:1px solid var(--border);border-radius:18px;
  padding:18px;box-shadow:var(--sh-3);
  display:none;
}
.tweaks.on{display:block;animation:slideUp .25s var(--ease)}
.tweaks-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tweaks-title{font-family:var(--serif);font-style:italic;font-size:1.2rem}
.tweak-section{margin-bottom:16px}
.tweak-section:last-child{margin-bottom:0}
.tweak-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:8px}
.swatch-row{display:flex;gap:8px}
.swatch{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:2px solid var(--border);transition:all .2s;
}
.swatch:hover{transform:scale(1.08)}
.swatch.on{border-color:var(--text);transform:scale(1.05);box-shadow:0 0 0 3px color-mix(in oklab, var(--text) 8%, transparent)}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideInR{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes checkPop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.anim-in{animation:slideUp .35s var(--ease) both}
.anim-stagger > *{animation:slideUp .35s var(--ease) both;animation-delay:calc(var(--i,0) * 40ms)}

// Always use LOCAL date — never toISOString() which gives UTC date
function localDateStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function todayStr(){ return localDateStr(new Date()); }

// Normalize any date value from Google Sheets to YYYY-MM-DD string
function normDate(val){
  if(!val || val==='') return '';
  const s = String(val).trim();
  // Already correct YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // ISO with time "2026-05-07T..." — extract date part directly (no Date object needed)
  if(/^\d{4}-\d{2}-\d{2}T/.test(s)) return s.slice(0,10);
  // Sheets US format "5/7/2026" or "05/07/2026"
  const usMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(usMatch) return usMatch[3]+'-'+usMatch[1].padStart(2,'0')+'-'+usMatch[2].padStart(2,'0');
  // Sheets dashed format "2026/05/07"
  const dashMatch = s.match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
  if(dashMatch) return dashMatch[1]+'-'+dashMatch[2]+'-'+dashMatch[3];
  // Last resort: parse and use LOCAL date (not UTC)
  try {
    const d = new Date(s);
    if(!isNaN(d.getTime())) return localDateStr(d);
  } catch(e){}
  return s;
}

// Normalize a time value to HH:MM string
function normTime(val){
  if(!val || val==='') return '';
  const s = String(val).trim();
  // Already HH:MM or HH:MM:SS
  if(/^\d{1,2}:\d{2}/.test(s)) return s.slice(0,5);
  // ISO with time component
  if(/T\d{2}:\d{2}/.test(s)) return s.replace(/.*T(\d{2}:\d{2}).*/,'$1');
  return s;
}
function daysFromNow(n){ const d=new Date();d.setDate(d.getDate()+n);return localDateStr(d) }

// ═══════════════════════════════════════════════════════════════
// APPS SCRIPT API
// ═══════════════════════════════════════════════════════════════
const API = {
  // All requests use GET — Apps Script CORS blocks POST from browsers.
  // Write payloads are JSON-encoded in the 'payload' query param.
  async call(params) {
    if (CONFIG.DEMO_MODE) return null;
    const url = CONFIG.SCRIPT_URL + '?' + new URLSearchParams(params);
    const res = await fetch(url);
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');
    return json.data;
  },
  async post(body) {
    if (CONFIG.DEMO_MODE) return null;
    // Encode the write payload as a GET parameter — avoids CORS preflight
    const url = CONFIG.SCRIPT_URL + '?payload=' + encodeURIComponent(JSON.stringify(body));
    const res = await fetch(url);
    if (!res.ok) throw new Error('Network error: ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'API error');
    return json.data;
  },
  async readAll() {
    if (CONFIG.DEMO_MODE) return { ...DEMO };
    const data = await this.call({ action:'readAll' });
    // normalize booleans from sheet
    if (data.users) data.users.forEach(u => u.active = u.active === true || u.active === 'TRUE');
    if (data.routines) data.routines.forEach(r => r.active = r.active === true || r.active === 'TRUE');
    if (data.rewards) data.rewards.forEach(r => r.points = Number(r.points)||0);
    if (data.tasks) data.tasks.forEach(t => {
      t.reward_points = Number(t.reward_points)||0;
      // Normalize date/time fields — Google Sheets may return full ISO strings or other formats
      t.due_date    = normDate(t.due_date);
      t.due_time    = normTime(t.due_time);
      t.created_at  = t.created_at  ? String(t.created_at)  : '';
      t.completed_at= t.completed_at? String(t.completed_at): '';
    });
    if (data.events) data.events.forEach(e => {
      e.start_date = normDate(e.start_date);
      e.end_date   = normDate(e.end_date);
      e.start_time = normTime(e.start_time);
      e.end_time   = normTime(e.end_time);
    });
    return data;
  },
  async addTask(task) {
    if (CONFIG.DEMO_MODE) { task.task_id='t'+Date.now(); DEMO.tasks.push(task); return task; }
    return this.post({ action:'add', sheet:'tasks', data:task });
  },
  async updateTask(task) {
    if (CONFIG.DEMO_MODE) { const i=DEMO.tasks.findIndex(t=>t.task_id===task.task_id); if(i!==-1)DEMO.tasks[i]={...DEMO.tasks[i],...task}; return task; }
    return this.post({ action:'update', sheet:'tasks', id:task.task_id, data:task });
  },
  async deleteTask(id) {
    if (CONFIG.DEMO_MODE) { DEMO.tasks=DEMO.tasks.filter(t=>t.task_id!==id); return; }
    return this.post({ action:'delete', sheet:'tasks', id });
  },
  async completeTask(id) {
    if (CONFIG.DEMO_MODE) {
      const t=DEMO.tasks.find(t=>t.task_id===id);
      if(t){t.status='completed';t.completed_at=new Date().toISOString();
        if(t.reward_points>0) DEMO.rewards.push({reward_id:'rw'+Date.now(),user_id:t.assigned_to,points:t.reward_points,reason:t.title,date:todayStr()});
      } return t;
    }
    return this.post({ action:'complete', id });
  },
  async reopenTask(id) {
    if (CONFIG.DEMO_MODE) { const t=DEMO.tasks.find(t=>t.task_id===id); if(t){t.status='pending';t.completed_at='';} return t; }
    return this.post({ action:'reopen', id });
  },
  async addEvent(ev) {
    if (CONFIG.DEMO_MODE) { ev.event_id='ev'+Date.now(); DEMO.events.push(ev); return ev; }
    return this.post({ action:'add', sheet:'events', data:ev });
  },
  async deleteEvent(id) {
    if (CONFIG.DEMO_MODE) { DEMO.events=DEMO.events.filter(e=>e.event_id!==id); return; }
    return this.post({ action:'delete', sheet:'events', id });
  },
};

function fmt12(t){
  if(!t)return'';
  try{
    const [h,m]=t.split(':').map(Number);
    const ampm=h>=12?'PM':'AM';
    const h12=h%12||12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }catch{return t}
}
function fmtDate(s){
  if(!s)return'';
  const clean = normDate(String(s));
  if(!clean) return '';
  // Use T12:00:00 (local noon) to avoid DST edge cases shifting the day
  const d = new Date(clean+'T12:00:00');
  if(isNaN(d.getTime())) return String(s);
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function isOverdue(t){
  if(t.status==='completed')return false;
  const td=todayStr();
  const dd=normDate(t.due_date);
  if(!dd) return false;
  if(dd<td)return true;
  if(dd===td&&t.due_time){
    const now=new Date();
    const tm=normTime(t.due_time);
    if(!tm) return false;
    const[h,m]=tm.split(':').map(Number);
    const due=new Date();due.setHours(h,m,0,0);
    return now>due;
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE — simple vdom-lite
// ═══════════════════════════════════════════════════════════════
function r(sel='div', attrs={}, ...children){
  const el = document.createElement(sel);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class'){ el.className=v; continue }
    if(k==='style'&&typeof v==='object'){ Object.assign(el.style,v); continue }
    if(k.startsWith('on')){ el.addEventListener(k.slice(2).toLowerCase(),v); continue }
    if(k==='html'){ el.innerHTML=v; continue }
    el.setAttribute(k,v);
  }
  for(const ch of children.flat(Infinity)){
    if(ch==null||ch===false)continue;
    el.appendChild(typeof ch==='string'||typeof ch==='number' ? document.createTextNode(String(ch)) : ch);
  }
  return el;
}
function txt(s){ return document.createTextNode(String(s)) }
function el(tag,cls,inner=''){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(inner)e.innerHTML=inner;
  return e;
}

function mount(id, node){
  const target=document.getElementById(id);
  if(!target)return;
  target.innerHTML='';
  if(node) target.appendChild(node);
}

function showToast(msg, ok=true){
  if(S.toastTimer) clearTimeout(S.toastTimer);
  const t=el('div','toast');
  t.textContent=(ok?'✅ ':'❌ ')+msg;
  if(!ok) t.style.background='var(--red)';
  mount('toast-mount',t);
  S.toastTimer=setTimeout(()=>mount('toast-mount',null),2600);
}

// ═══════════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════════
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  canvas.style.display='block';
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const colors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#CC5DE8'];
  const parts=Array.from({length:100},()=>({
    x:Math.random()*canvas.width,y:-10-Math.random()*30,
    r:5+Math.random()*7,d:2+Math.random()*2.5,
    color:colors[Math.floor(Math.random()*colors.length)],
    angle:Math.random()*Math.PI*2,ai:0.04+Math.random()*0.02,
    tilt:0,ti:0.06+Math.random()*0.04,
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      ctx.beginPath();ctx.fillStyle=p.color;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.tilt);
      Math.random()>.5?ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r):(ctx.arc(0,0,p.r/2,0,2*Math.PI),ctx.fill());
      ctx.restore();
      p.angle+=p.ai; p.tilt=Math.sin(p.ti+=p.ti)*10;
      p.y+=Math.cos(p.angle)+p.d; p.x+=Math.sin(p.angle)*1.2;
    });
    if(++frame<110) requestAnimationFrame(draw);
    else { canvas.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  draw();
}

// ═══════════════════════════════════════════════════════════════
function renderPanel(){
  if(!S.showPanel){ mount('panel-mount',null); S._pinUser=null; S._pinVal=''; S._pinShake=false; return; }

  // ── Panel state at module level so it survives re-renders ──
  if(!S._pinVal)   S._pinVal='';
  if(!S._pinShake) S._pinShake=false;
  // S._pinUser is set when a parent card is tapped

  function updateDots(){
    document.querySelectorAll('#pin-dot-area .pin-dot').forEach((d,i)=>{
      d.className='pin-dot'+(i<S._pinVal.length?' on':'');
      if(S._pinShake){ d.style.borderColor='var(--red)'; if(i<S._pinVal.length) d.style.background='var(--red)'; }
      else { d.style.borderColor=''; d.style.background=''; }
    });
  }

  function pressKey(k){
    if(S._pinVal.length>=4) return;
    S._pinVal += String(k);
    updateDots();
    if(S._pinVal.length===4){
      const u = S._pinUser;
      // Always coerce to string — Google Sheets may return pin as a number
      const rawPin = (u && u.pin !== undefined && u.pin !== null && u.pin !== '') ? u.pin : null;
      const correct = rawPin ? String(rawPin).trim() : String(CONFIG.ADMIN_PIN).trim();
      console.log('[PIN] entered:', S._pinVal, '| correct:', correct, '| match:', S._pinVal===correct);
      if(S._pinVal===correct){
        // 1. Clear PIN state first
        S._pinVal=''; S._pinUser=null; S._pinShake=false;
        // 2. Close panel before any re-render
        S.showPanel=false;
        mount('panel-mount', null);
        // 3. Update user state
        S.currentUser=u;
        S.isAdmin=(u.role==='parent');
        // 4. Re-render everything fresh
        renderAll();
        showToast('Welcome, '+u.name+'! 👑');
      } else {
        S._pinShake=true; updateDots();
        setTimeout(()=>{ S._pinVal=''; S._pinShake=false; updateDots(); }, 600);
      }
    }
  }

  function showUserList(){
    const body=document.getElementById('panel-body');
    if(!body) return;
    body.innerHTML='';
    const title=document.getElementById('panel-title');
    if(title) title.textContent="Who's here?";
    S._pinUser=null; S._pinVal='';

    S.users.forEach(u=>{
      const card=r('div',{
        class:'ucard'+(S.currentUser?.user_id===u.user_id?' active-user':''),
        onClick:()=>{
          if(u.role==='parent'){ S._pinUser=u; S._pinVal=''; showPinPad(); }
          else { selectUser(u); }
        }
      },
        r('div',{class:'av av-md',style:{color:u.color,borderColor:u.color,background:u.color+'22'}},u.avatar),
        r('div',{style:{flex:'1'}},
          r('div',{style:{fontWeight:800,fontSize:'.9rem'}},u.name),
          r('div',{style:{fontSize:'.72rem',color:'var(--text3)'}},u.role==='parent'?'👑 Parent · 🔐 PIN':'⭐ Child')
        ),
        S.currentUser?.user_id===u.user_id?r('div',{style:{width:8,height:8,borderRadius:'50%',background:u.color}}):null,
        (u.role==='parent'&&S.currentUser?.user_id!==u.user_id)?r('span',{style:{opacity:.45,fontSize:13}},'🔐'):null
      );
      body.appendChild(card);
    });
    if(S.currentUser){
      body.appendChild(r('button',{
        class:'btn btn-secondary',style:{width:'100%',marginTop:8,fontSize:'.82rem'},
        onClick:()=>{ S.currentUser=null;S.isAdmin=false;S._pinUser=null;S._pinVal='';S.showPanel=false;mount('panel-mount',null);renderAll(); }
      },'🚪 Sign Out'));
    }
  }

  function showPinPad(){
    const body=document.getElementById('panel-body');
    if(!body) return;
    body.innerHTML='';
    const title=document.getElementById('panel-title');
    if(title) title.textContent='🔐 '+S._pinUser.name;
    S._pinVal=''; S._pinShake=false;

    const av=r('div',{style:{
      width:56,height:56,fontSize:28,margin:'4px auto 0',
      color:S._pinUser.color,borderColor:S._pinUser.color,
      background:S._pinUser.color+'22',
      display:'flex',alignItems:'center',justifyContent:'center',
      borderRadius:'50%',border:'2px solid '+S._pinUser.color
    }},S._pinUser.avatar);

    const dotsWrap=r('div',{id:'pin-dot-area',class:'pin-dots'},
      ...[0,1,2,3].map(()=>r('div',{class:'pin-dot'}))
    );

    // Keys built ONCE — they call pressKey which reads S._pinVal
    const keyDefs=[1,2,3,4,5,6,7,8,9,'back',0,'cancel'];
    const grid=r('div',{class:'pin-grid'},
      ...keyDefs.map(k=>r('button',{class:'pin-key',
        onClick:()=>{
          if(k==='back'){ S._pinVal=S._pinVal.slice(0,-1); updateDots(); }
          else if(k==='cancel'){ S._pinUser=null; S._pinVal=''; showUserList(); }
          else pressKey(k);
        }
      },k==='back'?'⌫':k==='cancel'?'✕':String(k)))
    );

    const backBtn=r('button',{
      style:{background:'none',border:'none',color:'var(--text3)',fontSize:'.82rem',fontWeight:700,cursor:'pointer',marginBottom:4},
      onClick:()=>{ S._pinUser=null; S._pinVal=''; showUserList(); }
    },'← Back');

    body.appendChild(r('div',{style:{display:'flex',flexDirection:'column',gap:12,paddingTop:4,alignItems:'center'}},
      backBtn,av,dotsWrap,grid
    ));

    // Keyboard input for PIN pad
    if(window.__panelPinKey) window.removeEventListener('keydown', window.__panelPinKey);
    window.__panelPinKey = function(e){
      if(!document.getElementById('pin-dot-area') || !S._pinUser){
        window.removeEventListener('keydown', window.__panelPinKey);
        window.__panelPinKey = null;
        return;
      }
      if(/^[0-9]$/.test(e.key)){ e.preventDefault(); pressKey(Number(e.key)); }
      else if(e.key==='Backspace'){ e.preventDefault(); S._pinVal=S._pinVal.slice(0,-1); updateDots(); }
      else if(e.key==='Escape'){ e.preventDefault(); S._pinUser=null; S._pinVal=''; showUserList(); }
    };
    window.addEventListener('keydown', window.__panelPinKey);
  }

  // Build panel shell only if it doesn't exist yet
  const existing=document.getElementById('panel-shell');
  if(existing){
    // Panel already in DOM — just refresh the body content
    if(S._pinUser) showPinPad();
    else showUserList();
    return;
  }

  const wrap=r('div',{id:'panel-shell'},
    r('div',{class:'panel-bg',onClick:()=>{S.showPanel=false;S._pinUser=null;S._pinVal='';renderPanel();}}),
    r('div',{class:'panel'},
      r('div',{class:'panel-hdr'},
        r('div',{id:'panel-title',class:'panel-title'},"Who's here?"),
        r('button',{class:'modal-close',onClick:()=>{S.showPanel=false;S._pinUser=null;S._pinVal='';renderPanel();}},'✕')
      ),
      r('div',{id:'panel-body',style:{padding:'14px',flex:'1'}}),
      r('div',{style:{padding:'12px 14px',borderTop:'1.5px solid var(--border)',fontSize:'.72rem',color:'var(--text3)',fontWeight:700,textAlign:'center'}},'🔐 Parent profiles require PIN')
    )
  );
  mount('panel-mount', wrap);
  showUserList();
}

function selectUser(u){
  // Called directly for child users (no PIN needed)
  // For parent users after correct PIN, pressKey handles the flow directly
  S.currentUser=u;
  S.isAdmin=(u.role==='parent');
  S._pinUser=null; S._pinVal=''; S._pinShake=false;
  S.showPanel=false;
  mount('panel-mount', null);
  renderAll();
}

// ═══════════════════════════════════════════════════════════════
// PIN MODAL (in-app, for 🔐 button)
// ═══════════════════════════════════════════════════════════════
function openPinModal(){
  let pinVal='', pinShake=false;

  function updateDots(){
    const dots=document.querySelectorAll('#ipin-dots .pin-dot');
    dots.forEach((d,i)=>{
      d.className='pin-dot'+(i<pinVal.length?' on':'');
      if(pinShake){ d.style.borderColor='var(--red)'; }
      else { d.style.borderColor=''; }
    });
  }

  // Always coerce to string — sheet may return pin as a number
  const rawPin2 = (S.currentUser?.pin !== undefined && S.currentUser?.pin !== null && S.currentUser?.pin !== '') ? S.currentUser.pin : null;
  const correct = rawPin2 ? String(rawPin2).trim() : String(CONFIG.ADMIN_PIN).trim();

  const dots=r('div',{id:'ipin-dots',class:'pin-dots'},
    ...[0,1,2,3].map(()=>r('div',{class:'pin-dot'}))
  );

  // Keys built ONCE
  const keys=[1,2,3,4,5,6,7,8,9,'⌫',0,'✕'];
  const grid=r('div',{class:'pin-grid'},
    ...keys.map(k=>r('button',{class:'pin-key',onClick:()=>{
      if(k==='⌫'){ pinVal=pinVal.slice(0,-1); updateDots(); return; }
      if(k==='✕'){ mount('modal-mount',null); return; }
      if(pinVal.length>=4) return;
      pinVal+=String(k);
      updateDots();
      if(pinVal.length===4){
        if(pinVal===correct){ S.isAdmin=true; mount('modal-mount',null); renderAll(); showToast('👑 Parent mode on!'); }
        else { pinShake=true; updateDots(); setTimeout(()=>{ pinVal=''; pinShake=false; updateDots(); },500); }
      }
    }},String(k)))
  );

  const modal=r('div',{class:'modal-bg',onClick:e=>{if(e.target===e.currentTarget){mount('modal-mount',null);cleanup();}}},
    r('div',{class:'modal',style:{maxWidth:300,margin:'0 auto'}},
      r('div',{class:'modal-hdr'},
        r('div',{class:'modal-title'},'🔐 Parent Mode'),
        r('button',{class:'modal-close',onClick:()=>{mount('modal-mount',null);cleanup();}},'✕')
      ),
      r('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:16,paddingTop:8}},
        r('p',{style:{color:'var(--text3)',fontSize:'.85rem',fontWeight:700}},'Enter your 4-digit PIN'),
        dots, grid
      )
    )
  );
  mount('modal-mount', modal);

  // Keyboard input
  function cleanup(){ window.removeEventListener('keydown', onKey); }
  function onKey(e){
    if(!document.getElementById('ipin-dots')){ cleanup(); return; }
    if(/^[0-9]$/.test(e.key)){
      e.preventDefault();
      if(pinVal.length>=4) return;
      pinVal+=e.key; updateDots();
      if(pinVal.length===4){
        if(pinVal===correct){ cleanup(); S.isAdmin=true; mount('modal-mount',null); renderAll(); showToast('👑 Parent mode on!'); }
        else { pinShake=true; updateDots(); setTimeout(()=>{ pinVal=''; pinShake=false; updateDots(); },500); }
      }
    } else if(e.key==='Backspace'){ e.preventDefault(); pinVal=pinVal.slice(0,-1); updateDots(); }
    else if(e.key==='Escape'){ e.preventDefault(); cleanup(); mount('modal-mount',null); }
  }
  window.addEventListener('keydown', onKey);
}

// ═══════════════════════════════════════════════════════════════
// TASK FORM MODAL
// ═══════════════════════════════════════════════════════════════
function openTaskModal(existingTask=null){
  if(!S.isAdmin){ S.showPanel=true; renderPanel(); return; }

  // ── Form state ──
  const form = existingTask ? {...existingTask} : {
    title:'', description:'',
    assigned_to: S.currentUser?.user_id || S.users[0]?.user_id || '',
    category:'Chore', priority:'Medium',
    due_date: todayStr(), due_time:'', recurrence:'None',
    reward_points:10, status:'pending',
  };
  let customDays = (form.recurrence&&form.recurrence.startsWith('Custom:'))
    ? form.recurrence.replace('Custom:','').split(',').filter(Boolean) : [];
  let showNewCat=false, newCatName='', newCatIcon='📌';

  // ── Helpers to update specific parts without full redraw ──
  function setPills(groupId, activeValue){
    document.querySelectorAll('#'+groupId+' .ps-pill').forEach(btn=>{
      btn.classList.toggle('on', btn.dataset.val===activeValue);
    });
  }
  function setDayBtns(){
    document.querySelectorAll('#task-day-btns .day-btn').forEach(btn=>{
      btn.classList.toggle('on', customDays.includes(btn.dataset.day));
    });
  }
  function toggleCustomDaysSection(){
    const sec=document.getElementById('custom-days-sec');
    if(!sec) return;
    const show = form.recurrence==='Custom' || (form.recurrence&&form.recurrence.startsWith('Custom:'));
    sec.style.display = show ? 'flex' : 'none';
  }
  function toggleNewCatRow(){
    const row=document.getElementById('new-cat-row');
    if(row) row.style.display = showNewCat ? 'flex' : 'none';
    const catPills=document.getElementById('cat-pills');
    if(catPills) catPills.style.display = showNewCat ? 'none' : 'flex';
  }

  // ── Build the modal DOM once ──
  const cats = allCats();

  const priorityGroup = r('div',{id:'priority-pills',class:'pill-select'},
    ...['High','Medium','Low'].map(p=>r('button',{class:'ps-pill'+(form.priority===p?' on':''),
      'data-val':p,
      onClick:()=>{ form.priority=p; setPills('priority-pills',p); }
    },p))
  );

  const catPillsEl = r('div',{id:'cat-pills',class:'pill-select',style:{flexWrap:'wrap'}},
    ...cats.map(c=>r('button',{class:'ps-pill'+(form.category===c.n?' on':''),
      'data-val':c.n,
      onClick:()=>{ form.category=c.n; setPills('cat-pills',c.n); }
    },c.i+' '+c.n)),
    r('button',{class:'ps-pill',
      onClick:()=>{ showNewCat=true; toggleNewCatRow(); }
    },'+ New')
  );

  const newCatRow = r('div',{id:'new-cat-row',style:{display:'none',gap:7,alignItems:'center',marginTop:6}},
    r('input',{style:{width:40,textAlign:'center',fontSize:'1.2rem',border:'1.5px solid var(--border)',borderRadius:8,padding:'5px'},
      value:newCatIcon, maxLength:2,
      onInput:e=>{ newCatIcon=e.target.value; }
    }),
    r('input',{class:'finput',placeholder:'Category name',style:{flex:'1',marginBottom:0},
      onInput:e=>{ newCatName=e.target.value; }
    }),
    r('button',{class:'btn btn-primary',style:{padding:'6px 12px',fontSize:'.78rem'},
      onClick:()=>{
        if(!newCatName.trim()) return;
        if(!allCats().find(c=>c.n===newCatName.trim())) CUSTOM_CATS.push({n:newCatName.trim(),i:newCatIcon});
        form.category=newCatName.trim();
        showNewCat=false;
        // Add pill dynamically and select it
        const cp=document.getElementById('cat-pills');
        if(cp){
          const btn=r('button',{class:'ps-pill on','data-val':form.category,
            onClick:()=>{ form.category=newCatName.trim(); setPills('cat-pills',form.category); }
          },newCatIcon+' '+newCatName.trim());
          cp.insertBefore(btn, cp.lastElementChild); // before + New
          setPills('cat-pills',form.category);
        }
        toggleNewCatRow();
        newCatName=''; newCatIcon='📌';
      }
    },'Add')
  );

  const recurrencePills = r('div',{id:'rec-pills',class:'pill-select'},
    ...['None','Daily','Weekdays','Weekly','Monthly','Custom'].map(rv=>{
      const isOn = form.recurrence===rv || (rv==='Custom' && (form.recurrence==='Custom'||form.recurrence.startsWith('Custom:')));
      return r('button',{class:'ps-pill'+(isOn?' on':''), 'data-val':rv,
        onClick:()=>{
          if(rv==='Custom'){ form.recurrence='Custom'; }
          else { form.recurrence=rv; customDays=[]; }
          // Update all rec pills
          document.querySelectorAll('#rec-pills .ps-pill').forEach(btn=>{
            const v=btn.dataset.val;
            const active=form.recurrence===v||(v==='Custom'&&(form.recurrence==='Custom'||form.recurrence.startsWith('Custom:')));
            btn.classList.toggle('on',active);
          });
          toggleCustomDaysSection();
        }
      },rv);
    })
  );

  const customDaysSec = r('div',{id:'custom-days-sec',id:'task-day-btns-wrap',
    style:{display:(form.recurrence==='Custom'||form.recurrence.startsWith('Custom:'))?'flex':'none',
      gap:6,flexWrap:'wrap',marginTop:8}},
    r('div',{id:'task-day-btns',style:{display:'flex',gap:6,flexWrap:'wrap'}},
      ...['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>
        r('button',{class:'day-btn'+(customDays.includes(d)?' on':''), 'data-day':d,
          onClick:()=>{
            customDays = customDays.includes(d) ? customDays.filter(x=>x!==d) : [...customDays,d];
            form.recurrence = customDays.length ? 'Custom:'+customDays.join(',') : 'Custom';
            setDayBtns();
          }
        },d)
      )
    )
  );

  const assignSelect = r('select',{class:'fselect',
    onInput:e=>{ form.assigned_to=e.target.value; }
  },
    ...S.users.map(u=>{ const o=r('option',{value:u.user_id},u.avatar+' '+u.name); if(u.user_id===form.assigned_to) o.selected=true; return o; })
  );

  const titleInput = r('input',{class:'finput',placeholder:'e.g. Brush Teeth',value:form.title,
    onInput:e=>{ form.title=e.target.value; }
  });
  const descInput = r('textarea',{class:'ftextarea',placeholder:'Optional...',rows:2,
    onInput:e=>{ form.description=e.target.value; }
  },form.description||'');
  const dateInput = r('input',{class:'finput',type:'date',value:form.due_date,
    onInput:e=>{ form.due_date=e.target.value; }
  });
  const timeInput = r('input',{class:'finput',type:'time',value:form.due_time||'',
    onInput:e=>{ form.due_time=e.target.value; }
  });
  const pointsInput = r('input',{class:'finput',type:'number',min:0,max:200,value:form.reward_points,
    onInput:e=>{ form.reward_points=Number(e.target.value)||0; }
  });

  const modal = r('div',{class:'modal-bg',onClick:e=>{ if(e.target===e.currentTarget) mount('modal-mount',null); }},
    r('div',{class:'modal'},
      r('div',{class:'modal-hdr'},
        r('div',{class:'modal-title'}, existingTask?'✏️ Edit Task':'➕ New Task'),
        r('button',{class:'modal-close',onClick:()=>mount('modal-mount',null)},'✕')
      ),
      r('div',{class:'fgroup'},r('label',{class:'flabel'},'Task Title *'),titleInput),
      r('div',{class:'fgroup'},r('label',{class:'flabel'},'Description'),descInput),
      r('div',{class:'frow'},
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'Assigned To'),assignSelect),
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'Priority'),priorityGroup)
      ),
      r('div',{class:'fgroup',style:{marginTop:4}},
        r('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}},
          r('label',{class:'flabel',style:{margin:0}},'Category'),
          r('button',{style:{background:'none',border:'none',color:'var(--accent)',fontSize:'.78rem',fontWeight:800,cursor:'pointer'},
            onClick:()=>{ showNewCat=!showNewCat; toggleNewCatRow(); }
          },'+ New')
        ),
        catPillsEl, newCatRow
      ),
      r('div',{class:'fgroup'},r('label',{class:'flabel'},'Recurrence'), recurrencePills, customDaysSec),
      r('div',{class:'frow'},
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'Due Date'),dateInput),
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'Due Time'),timeInput)
      ),
      r('div',{class:'fgroup',style:{marginTop:8}},r('label',{class:'flabel'},'⭐ Reward Points'),pointsInput),
      r('div',{style:{display:'flex',gap:10,marginTop:4}},
        r('button',{class:'btn btn-secondary',style:{flex:1},onClick:()=>mount('modal-mount',null)},'Cancel'),
        r('button',{class:'btn btn-primary',style:{flex:2},onClick:async()=>{
          if(!form.title.trim()) return;
          const finalRec = (form.recurrence==='Custom'||(form.recurrence&&form.recurrence.startsWith('Custom:')))
            ? (customDays.length?'Custom:'+customDays.join(','):'None')
            : form.recurrence;
          const saved={...form, recurrence:finalRec};
          try{
            if(existingTask){ await API.updateTask(saved); showToast('Task updated!'); }
            else { saved.created_at=new Date().toISOString(); saved.completed_at=''; await API.addTask(saved); showToast('Task added!'); }
            const data=await API.readAll();
            if(data){ S.tasks=data.tasks||[]; S.rewards=data.rewards||[]; }
            // Navigate calendar to the task's due date so it's immediately visible
            if(saved.due_date) S.calSelectedDate=new Date(saved.due_date+'T12:00:00');
            mount('modal-mount',null); renderContent();
          } catch(e){ showToast(e.message,false); }
        }}, existingTask?'💾 Save':'✅ Add Task')
      )
    )
  );
  mount('modal-mount', modal);
}

// ═══════════════════════════════════════════════════════════════
// EVENT FORM MODAL
// ═══════════════════════════════════════════════════════════════
function openEventModal(dateStr=''){
  if(!S.isAdmin){S.showPanel=true;renderPanel();return}
  const today=todayStr();
  let form={
    title:'',
    start_date: dateStr||today,
    start_time: '',
    end_date:   dateStr||today,
    end_time:   '',
    color:      '#7C3AED',
    assigned_to:'',
    description:'',
  };
  const colors=['#7C3AED','#2563EB','#DB2777','#059669','#E8521A','#D97706','#DC2626'];

  // Keep named refs so start date change can sync end date input visually
  const startDateInput = r('input',{class:'finput',type:'date',value:form.start_date,
    onInput:e=>{
      form.start_date=e.target.value;
      if(!endDateInput.dataset.userEdited){
        // End not manually set yet — keep it in sync with start
        form.end_date=e.target.value;
        endDateInput.value=e.target.value;
      } else if(endDateInput.value && endDateInput.value < e.target.value){
        // End was manually set but is now before new start — clamp it forward
        form.end_date=e.target.value;
        endDateInput.value=e.target.value;
        endDateInput.style.borderColor='';
        endDateError.style.display='none';
      }
    }
  });
  // Error label shown below end date when it's before start date
  const endDateError = r('div',{
    id:'end-date-error',
    style:{color:'var(--red)',fontSize:'.75rem',fontWeight:700,
           marginTop:4,display:'none'}
  },'⚠️ End date cannot be before start date');

  const endDateInput = r('input',{class:'finput',type:'date',value:form.end_date,
    onInput:e=>{
      form.end_date=e.target.value;
      endDateInput.dataset.userEdited='1';
      // Validate against start date
      if(form.end_date && form.start_date && form.end_date < form.start_date){
        endDateInput.style.borderColor='var(--red)';
        endDateError.style.display='block';
      } else {
        endDateInput.style.borderColor='';
        endDateError.style.display='none';
      }
    }
  });
  const startTimeInput = r('input',{class:'finput',type:'time',value:form.start_time,
    onInput:e=>{ form.start_time=e.target.value; }
  });
  const endTimeInput = r('input',{class:'finput',type:'time',value:form.end_time,
    onInput:e=>{ form.end_time=e.target.value; }
  });
  const titleInput = r('input',{class:'finput',placeholder:'e.g. Soccer Practice',
    onInput:e=>{ form.title=e.target.value; }
  });
  const assignSelect = r('select',{class:'fselect',onInput:e=>{ form.assigned_to=e.target.value; }},
    r('option',{value:''},'👨‍👩‍👧‍👦 Whole Family'),
    ...S.users.map(u=>r('option',{value:u.user_id},u.avatar+' '+u.name))
  );

  // Color swatches — update border on click without full redraw
  const colorSwatches = colors.map(c=>{
    const btn=r('button',{
      style:{width:28,height:28,borderRadius:'50%',background:c,
        border:'3px solid '+(form.color===c?'var(--text)':'transparent'),
        cursor:'pointer'},
      onClick:()=>{
        form.color=c;
        colorSwatches.forEach(b=>{
          b.style.border='3px solid '+(b.dataset.color===c?'var(--text)':'transparent');
        });
      }
    });
    btn.dataset.color=c;
    return btn;
  });

  const modal=r('div',{class:'modal-bg',onClick:e=>{if(e.target===e.currentTarget)mount('modal-mount',null)}},
    r('div',{class:'modal'},
      r('div',{class:'modal-hdr'},
        r('div',{class:'modal-title'},'📅 New Event'),
        r('button',{class:'modal-close',onClick:()=>mount('modal-mount',null)},'✕')
      ),
      r('div',{class:'fgroup'},r('label',{class:'flabel'},'Title *'),titleInput),
      r('div',{class:'frow'},
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'Start Date'),startDateInput),
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'Start Time'),startTimeInput)
      ),
      r('div',{class:'frow',style:{marginTop:8}},
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'End Date'),endDateInput,endDateError),
        r('div',{class:'fgroup',style:{marginBottom:0}},r('label',{class:'flabel'},'End Time'),endTimeInput)
      ),
      r('div',{class:'fgroup',style:{marginTop:8}},r('label',{class:'flabel'},'Assign To'),assignSelect),
      r('div',{class:'fgroup'},r('label',{class:'flabel'},'Color'),
        r('div',{style:{display:'flex',gap:7,flexWrap:'wrap'}},...colorSwatches)
      ),
      r('div',{style:{display:'flex',gap:10,marginTop:4}},
        r('button',{class:'btn btn-secondary',style:{flex:1},onClick:()=>mount('modal-mount',null)},'Cancel'),
        r('button',{class:'btn btn-primary',style:{flex:2},onClick:async()=>{
          if(!form.title.trim())return;
          // Read final values directly from inputs
          form.start_date = startDateInput.value || form.start_date;
          form.end_date   = endDateInput.value   || form.end_date;
          form.start_time = startTimeInput.value || form.start_time;
          form.end_time   = endTimeInput.value   || form.end_time;
          // Validate: end date cannot be before start date
          if(form.end_date && form.start_date && form.end_date < form.start_date){
            endDateInput.style.borderColor='var(--red)';
            endDateError.style.display='block';
            endDateInput.scrollIntoView({behavior:'smooth',block:'center'});
            return;
          }
          // Also validate same-day: end time cannot be before start time
          if(form.end_date===form.start_date && form.end_time && form.start_time && form.end_time < form.start_time){
            endTimeInput.style.borderColor='var(--red)';
            showToast('End time cannot be before start time',false);
            return;
          }
          try{
            await API.addEvent(form);
            const data=await API.readAll();if(data)S.events=data.events||[];
            mount('modal-mount',null);showToast('Event added!');renderContent();
          }catch(e){showToast(e.message,false);}
        }},'📅 Add Event')
      )
    )
  );
  mount('modal-mount',modal);
}

// TASK CARD COMPONENT
// ═══════════════════════════════════════════════════════════════
function buildTaskCard(task, opts={}){
  const user=getUser(task.assigned_to);
  const done=task.status==='completed';
  const overdue=isOverdue(task);
  const color=overdue?'var(--red)':done?'var(--green)':user?.color||'var(--accent)';

  const check=r('div',{class:`tcheck${done?' on':''}`,onClick:async e=>{
    e.stopPropagation();
    if(!S.isAdmin&&!S.currentUser){S.showPanel=true;renderPanel();return}
    try{
      if(done) await API.reopenTask(task.task_id);
      else { await API.completeTask(task.task_id); if(!done)launchConfetti(); showToast(done?'Reopened!':'Task done! 🎉'); }
      const data=await API.readAll();if(data){S.tasks=data.tasks||[];S.rewards=data.rewards||[];}
      renderContent();
    }catch(e){showToast(e.message,false);}
  }}, done?'✓':'');

  const meta=[
    user?r('span',{style:{color:user.color,fontWeight:700}},`${user.avatar} ${user.name}`):null,
    task.due_date?r('span',{},fmtDate(task.due_date)):null,
    task.due_time?r('span',{},`🕐 ${fmt12(task.due_time)}`):null,
    r('span',{class:`tag tag-${task.priority?.toLowerCase()==='high'?'high':task.priority?.toLowerCase()==='medium'?'med':'low'}`},task.priority||''),
    overdue?r('span',{class:'tag tag-over'},'⚠️ Late'):null,
    done?r('span',{class:'tag tag-done'},'✓ Done'):null,
    task.reward_points>0?r('span',{},`⭐ ${task.reward_points}`):null,
    task.recurrence&&task.recurrence!=='None'?r('span',{style:{color:'var(--text3)'}},`🔁 ${task.recurrence.replace('Custom:','')}`):null,
  ].filter(Boolean);

  const actions=S.isAdmin?r('div',{class:'tactions'},
    r('button',{class:'icon-btn',style:{width:28,height:28,fontSize:13},onClick:e=>{e.stopPropagation();openTaskModal(task)}},'✏️'),
    r('button',{class:'icon-btn',style:{width:28,height:28,fontSize:13,color:'var(--red)'},onClick:async e=>{
      e.stopPropagation();
      if(!confirm('Delete this task?'))return;
      try{await API.deleteTask(task.task_id);S.tasks=S.tasks.filter(t=>t.task_id!==task.task_id);renderContent();showToast('Deleted.');}
      catch(e){showToast(e.message,false);}
    }},'🗑️')
  ):null;

  return r('div',{class:`tcard${done?' done':''}`},
    r('div',{class:'tbar',style:{background:color}}),
    check,
    r('div',{class:'tbody'},
      r('div',{class:'ttitle'},`${catIcon(task.category)} ${task.title}`),
      r('div',{class:'tmeta'},...meta)
    ),
    actions
  );
}

function timeToMins(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
