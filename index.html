// ── SKYLIGHT TIME-GRID CALENDAR ──────────────────────────────
function buildSkylightCalendar(opts){
  opts = opts || {};
  const filterUser  = opts.filterUser  !== undefined ? opts.filterUser  : S.calFilter;
  const showFilter  = opts.showFilter  !== undefined ? opts.showFilter  : true;
  const showAddBtn  = opts.showAddBtn  !== undefined ? opts.showAddBtn  : S.isAdmin;
  const onFilterChange = opts.onFilterChange || function(uid){ S.calFilter=uid; };

  const today  = new Date();
  const tdStr  = localDateStr(today);
  const sel    = S.calSelectedDate;
  const ws     = new Date(sel); ws.setDate(ws.getDate()-ws.getDay());
  const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(ws); d.setDate(d.getDate()+i); return d; });
  const START=5, END=22, HOURS=Array.from({length:END-START},(_,i)=>START+i);
  // Dynamic hour height: fit all 14 hours on screen without scrolling
  const OVERHEAD = 320; // topbar + bottomnav + nav + chips + headers + padding
  const availH = (window.innerHeight || 700) - OVERHEAD;
  const HH = Math.max(26, Math.min(52, Math.floor(availH / HOURS.length)));
  const TOTAL = (END-START)*60;
  const nowMins = today.getHours()*60+today.getMinutes();
  const nowTop  = ((nowMins-START*60)/TOTAL)*HOURS.length*HH;
  const showNow = today.getHours()>=START && today.getHours()<END;
  const cols = weekDays.length;

  // Filter tasks/events by selected user
  function filteredTasks(ds){
    return S.tasks.filter(t => normDate(t.due_date)===ds && (filterUser==='all' || t.assigned_to===filterUser));
  }
  function filteredEvents(ds){
    return S.events.filter(e => normDate(e.start_date)===ds && (filterUser==='all' || !e.assigned_to || e.assigned_to==='' || e.assigned_to===filterUser));
  }

  // ── Member filter chips ──
  function buildFilterChips(containerId){
    const chips = r('div',{id:containerId, class:'sky-member-chips',style:{padding:'6px 0 4px'}},
      r('button',{
        class:'sky-chip'+(filterUser==='all'?' active':''),
        style:filterUser==='all'?{background:'var(--accbg)',borderColor:'var(--accent)',color:'var(--accent)'}:{},
        onClick:()=>{ onFilterChange('all'); }
      },'👨‍👩‍👧‍👦 Everyone'),
      ...S.users.map(u=>{
        const p=getUserPastel(u.user_id);
        const isOn=filterUser===u.user_id;
        return r('button',{
          class:'sky-chip'+(isOn?' active':''),
          style:isOn?{background:p.bg,borderColor:p.border,color:p.text}:{},
          onClick:()=>{ onFilterChange(u.user_id); }
        }, r('span',{style:{fontSize:'.9rem'}},u.avatar), u.name);
      })
    );
    return chips;
  }

  // ── Nav bar ──
  const nav = r('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 12px 6px',flexWrap:'wrap',gap:6}},
    r('div',{style:{display:'flex',gap:5,alignItems:'center'}},
      r('button',{style:{background:'none',border:'1.5px solid var(--border)',borderRadius:8,padding:'5px 11px',cursor:'pointer',fontSize:'.78rem',fontWeight:700,color:'var(--text2)'},
        onClick:()=>{ const d=new Date(ws);d.setDate(d.getDate()-7);S.calSelectedDate=d; opts.onNavigate&&opts.onNavigate(); }},'< Prev'),
      r('button',{style:{background:'var(--accbg)',border:'1.5px solid var(--accent)',borderRadius:8,padding:'5px 11px',cursor:'pointer',fontSize:'.78rem',fontWeight:700,color:'var(--accent)'},
        onClick:()=>{ S.calSelectedDate=new Date(); opts.onNavigate&&opts.onNavigate(); }},'Today'),
      r('button',{style:{background:'none',border:'1.5px solid var(--border)',borderRadius:8,padding:'5px 11px',cursor:'pointer',fontSize:'.78rem',fontWeight:700,color:'var(--text2)'},
        onClick:()=>{ const d=new Date(ws);d.setDate(d.getDate()+7);S.calSelectedDate=d; opts.onNavigate&&opts.onNavigate(); }},'Next >')
    ),
    r('div',{style:{textAlign:'center',flex:'1',minWidth:120}},
      r('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'.95rem',fontWeight:800,color:'var(--text)'}},
        weekDays[3].toLocaleDateString([],{month:'long',year:'numeric'})
      ),
      r('div',{style:{fontSize:'.7rem',color:'var(--text3)',fontWeight:600}},
        weekDays[0].toLocaleDateString([],{month:'short',day:'numeric'})+' – '+weekDays[6].toLocaleDateString([],{month:'short',day:'numeric'})
      )
    ),
    showAddBtn ? r('button',{class:'btn btn-primary',style:{padding:'5px 12px',fontSize:'.75rem'},
      onClick:()=>openEventModal(tdStr)},'+ Event') : null
  );

  // ── Day headers ──
  const dayHdr = r('div',{class:'sky-week-header',style:{gridTemplateColumns:'44px repeat('+cols+',1fr)'}},
    r('div',{style:{width:44,borderRight:'1px solid var(--border)'}}),
    ...weekDays.map((d,di)=>{
      const ds=localDateStr(d);
      const isT=ds===tdStr;
      const showMonth=d.getDate()===1||di===0;
      return r('div',{class:'sky-day-hdr'},
        r('div',{class:'sky-day-name'},d.toLocaleDateString([],{weekday:'short'})),
        r('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:3}},
          r('div',{class:'sky-day-num'+(isT?' today':''),onClick:()=>{S.calSelectedDate=d;opts.onNavigate&&opts.onNavigate();}},d.getDate()),
          showMonth?r('div',{style:{fontSize:'.6rem',fontWeight:700,color:isT?'var(--accent)':'var(--text3)',letterSpacing:'.02em',marginTop:1}},d.toLocaleDateString([],{month:'short'})):null
        )
      );
    })
  );

  // ── All-day row (events + tasks without time) ──
  const allDayEvts  = weekDays.map(d=>filteredEvents(localDateStr(d)).filter(e=>!e.start_time));
  const allDayTasks = weekDays.map(d=>filteredTasks(localDateStr(d)).filter(t=>!t.due_time||t.due_time===''));
  const hasAllDay   = allDayEvts.some(a=>a.length>0)||allDayTasks.some(a=>a.length>0);
  const allDayRow   = hasAllDay ? r('div',{class:'sky-allday-row',style:{gridTemplateColumns:'44px repeat('+cols+',1fr)'}},
    r('div',{style:{width:44,borderRight:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.58rem',color:'var(--text3)',padding:2,flexDirection:'column',gap:1}},r('span',{},'all'),r('span',{},'day')),
    ...weekDays.map((_,di)=>r('div',{class:'sky-allday-cell'},
      ...allDayEvts[di].map(ev=>{
        const u=ev.assigned_to?getUser(ev.assigned_to):null;
        const p=u?getUserPastel(u.user_id):{bg:'var(--bg2)',border:'var(--border)',text:'var(--text2)'};
        return r('div',{class:'sky-allday-ev',style:{background:p.bg,color:p.text,borderLeft:'3px solid '+p.border}},
          ev.title+(u?' '+u.avatar:'')
        );
      }),
      ...allDayTasks[di].map(t=>{
        const u=getUser(t.assigned_to);
        const p=u?getUserPastel(u.user_id):{bg:'var(--bg2)',border:'var(--border)',text:'var(--text2)'};
        const done=t.status==='completed';
        return r('div',{class:'sky-allday-ev',
          style:{background:done?'var(--greenbg)':p.bg,color:done?'var(--green)':p.text,
            borderLeft:'3px solid '+(done?'var(--green)':p.border),
            textDecoration:done?'line-through':'none',cursor:'pointer'},
          onClick:async()=>{
            if(!S.isAdmin&&!S.currentUser){S.showPanel=true;renderPanel();return;}
            if(!done){try{await API.completeTask(t.task_id);launchConfetti();showToast('Done!');const data=await API.readAll();if(data){S.tasks=data.tasks||[];S.rewards=data.rewards||[];}renderContent();}catch(e){showToast(e.message,false);}}
          }
        },catIcon(t.category)+' '+t.title+(u?' · '+u.avatar+' '+u.name:''));
      })
    ))
  ):null;

  // ── Time column ──
  const timeCol = r('div',{class:'sky-time-col'},
    ...HOURS.map(h=>r('div',{class:'sky-time-label',style:{height:HH+'px'}},h<12?h+' AM':h===12?'12 PM':(h-12)+' PM'))
  );

  // ── Day columns ──
  const dayCols = r('div',{class:'sky-day-cols',style:{gridTemplateColumns:'repeat('+cols+',1fr)'}},
    ...weekDays.map((d,di)=>{
      const ds=localDateStr(d);
      const isT=ds===tdStr;
      const evts  = filteredEvents(ds).filter(e=>e.start_time);
      const tasks = filteredTasks(ds).filter(t=>t.due_time);

      const hourRows = HOURS.map(h=>r('div',{class:'sky-hour-row',
        style:{height:HH+'px',background:isT&&h===today.getHours()?'rgba(224,90,58,0.025)':''}}));

      // Event blocks
      const evtBlocks = evts.map(ev=>{
        const u=ev.assigned_to?getUser(ev.assigned_to):null;
        const p=u?getUserPastel(u.user_id):{bg:'var(--bg2)',border:'var(--border)',text:'var(--text2)'};
        const sm=timeToMins(ev.start_time);
        const em=ev.end_time?timeToMins(ev.end_time):sm+60;
        const top=Math.max(0,(sm-START*60)/60*HH);
        const ht=Math.max(24,(em-sm)/60*HH-2);
        return r('div',{class:'sky-event',
          style:{top:top+'px',height:ht+'px',background:p.bg,borderLeft:'3px solid '+p.border,color:p.text}},
          r('div',{class:'sky-event-title'},ev.title),
          ht>28?r('div',{class:'sky-event-time'},
            (u?u.avatar+' '+u.name:'')+(ev.start_time?' · '+fmt12(ev.start_time)+(ev.end_time?' – '+fmt12(ev.end_time):''):'')
          ):null,
          u?r('div',{class:'sky-event-av',style:{background:p.bg}},u.avatar):null
        );
      });

      // Task blocks
      const taskBlocks = tasks.map(t=>{
        const u=getUser(t.assigned_to);
        const p=u?getUserPastel(u.user_id):{bg:'var(--bg2)',border:'var(--border)',text:'var(--text2)'};
        const sm=timeToMins(t.due_time);
        const top=Math.max(0,(sm-START*60)/60*HH);
        const ht=52;
        const done=t.status==='completed';
        return r('div',{class:'sky-event',
          style:{top:top+'px',height:ht+'px',
            background:done?'var(--greenbg)':p.bg,
            borderLeft:'3px solid '+(done?'var(--green)':p.border),
            color:done?'var(--green)':p.text,
            opacity:done?.65:1},
          onClick:async()=>{
            if(!S.isAdmin&&!S.currentUser){S.showPanel=true;renderPanel();return;}
            if(!done){try{await API.completeTask(t.task_id);launchConfetti();showToast('Done!');const data=await API.readAll();if(data){S.tasks=data.tasks||[];S.rewards=data.rewards||[];}renderContent();}catch(e){showToast(e.message,false);}}
          }},
          r('div',{class:'sky-event-title',style:{textDecoration:done?'line-through':'none'}},
            catIcon(t.category)+' '+t.title
          ),
          r('div',{class:'sky-event-time'},
            (u?u.avatar+' '+u.name:'')+(t.due_time?' · '+fmt12(t.due_time):'')
          ),
          u?r('div',{class:'sky-event-av',style:{background:done?'var(--greenbg)':p.bg}},u.avatar):null
        );
      });

      const nowLine=(isT&&showNow)?r('div',{class:'sky-now-line',style:{top:nowTop+'px'}}):null;
      return r('div',{class:'sky-day-col',style:{minHeight:HOURS.length*HH+'px'}},
        ...hourRows,...evtBlocks,...taskBlocks,nowLine);
    })
  );

  const gridBody = r('div',{class:'sky-grid-wrap'},
    timeCol,
    r('div',{style:{flex:1,position:'relative'}},dayCols)
  );

  const container = r('div',{style:{background:'var(--surface)',borderRadius:'var(--r)',border:'1px solid var(--border)',overflow:'hidden',boxShadow:'var(--sh)',marginTop:10}},
    r('div',{style:{padding:'0 12px'}},nav),
    showFilter ? r('div',{style:{padding:'0 12px',borderBottom:'1px solid var(--border)'}},buildFilterChips('cal-filter-'+Math.random().toString(36).slice(2))) : null,
    dayHdr,
    allDayRow,
    gridBody
  );
  return container;
}

// ── TASKS VIEW ──
function buildTasks(){
  let filterUser='all',filterStatus='all',filterCat='all';

  function draw(){
    const filtered=S.tasks.filter(t=>{
      if(filterUser!=='all'&&t.assigned_to!==filterUser)return false;
      if(filterStatus==='pending'&&t.status!=='pending')return false;
      if(filterStatus==='completed'&&t.status!=='completed')return false;
      if(filterStatus==='overdue'&&!isOverdue(t))return false;
      if(filterCat!=='all'&&t.category!==filterCat)return false;
      return true;
    }).sort((a,b)=>a.due_date<b.due_date?-1:a.due_date>b.due_date?1:0);

    const statusPills=['all','pending','completed','overdue'].map(s=>
      r('button',{class:`ps-pill${filterStatus===s?' on':''}`,onClick:()=>{filterStatus=s;draw()}},
        s==='all'?'All':s==='overdue'?'⚠️ Overdue':s.charAt(0).toUpperCase()+s.slice(1)
      )
    );
    const userPills=[
      r('button',{class:`ps-pill${filterUser==='all'?' on':''}`,onClick:()=>{filterUser='all';draw()}},'Everyone'),
      ...S.users.map(u=>r('button',{class:`ps-pill${filterUser===u.user_id?' on':''}`,
        style:filterUser===u.user_id?{background:u.color,borderColor:u.color}:{},
        onClick:()=>{filterUser=u.user_id;draw()}},`${u.avatar} ${u.name}`))
    ];
    const catPills=[
      r('button',{class:`ps-pill${filterCat==='all'?' on':''}`,onClick:()=>{filterCat='all';draw()}},'📋 All'),
      ...allCats().map(c=>r('button',{class:`ps-pill${filterCat===c.n?' on':''}`,onClick:()=>{filterCat=c.n;draw()}},`${c.i} ${c.n}`))
    ];

    const wrap=document.getElementById('tasks-inner');
    if(!wrap)return;
    wrap.innerHTML='';

    wrap.appendChild(r('div',{class:'sh',style:{marginTop:4}},
      r('div',{class:'sh-title'},'All Tasks'),
      r('button',{class:'btn btn-primary',style:{padding:'6px 14px',fontSize:'.8rem'},onClick:()=>openTaskModal()},'+ New Task')
    ));
    const filterWrap=r('div',{style:{marginBottom:12}},
      r('div',{class:'pill-select',style:{marginBottom:7}},...statusPills),
      r('div',{class:'pill-select',style:{marginBottom:7}},...userPills),
      r('div',{class:'pill-select',style:{marginBottom:7}},...catPills)
    );
    wrap.appendChild(filterWrap);
    wrap.appendChild(r('div',{style:{fontSize:'.78rem',color:'var(--text3)',fontWeight:700,marginBottom:8}},`${filtered.length} tasks`));
    if(!filtered.length) wrap.appendChild(r('div',{style:{textAlign:'center',padding:'32px 0',color:'var(--text3)'}},'No tasks match filters'));
    filtered.forEach(t=>wrap.appendChild(buildTaskCard(t)));
  }

  const outer=r('div',{class:'anim-in'},r('div',{id:'tasks-inner'}));
  // draw after mounted
  setTimeout(draw,0);
  return outer;
}

function buildCalendarFull(){
  const today=new Date();
  let viewDate=new Date(S.calSelectedDate);
  let mode=S.calViewMode;

  function draw(){
    const wrap=document.getElementById('cal-inner');
    if(!wrap)return;
    wrap.innerHTML='';
    S.calViewMode=mode;

    // ── Header with mode toggle + add event ──
    const hdr=r('div',{class:'sh',style:{marginTop:4,marginBottom:8}},
      r('div',{class:'sh-title'},'📅 Calendar'),
      r('div',{style:{display:'flex',gap:6,alignItems:'center'}},
        r('button',{class:'ps-pill'+(mode==='week'?' on':''),onClick:()=>{mode='week';S.calSelectedDate=viewDate;draw()}},'Week'),
        r('button',{class:'ps-pill'+(mode==='month'?' on':''),onClick:()=>{mode='month';draw()}},'Month'),
        S.isAdmin?r('button',{class:'btn btn-primary',style:{padding:'5px 11px',fontSize:'.75rem'},
          onClick:()=>openEventModal(localDateStr(viewDate))},'+ Event'):null
      )
    );
    wrap.appendChild(hdr);

    if(mode==='week'){
      // Use the shared Skylight time-grid
      S.calSelectedDate=viewDate;
      const grid=buildSkylightCalendar({
        showAddBtn: false, // already in header above
        onNavigate:()=>{
          viewDate=new Date(S.calSelectedDate);
          draw();
        },
        onFilterChange:(uid)=>{
          S.calFilter=uid;
          draw();
        },
      });
      wrap.appendChild(grid);

    } else {
      // Month grid view
      const y=viewDate.getFullYear(), m=viewDate.getMonth();
      const firstDay=new Date(y,m,1).getDay();
      const daysInMonth=new Date(y,m+1,0).getDate();
      const tdStr=localDateStr(today);

      const nav=r('div',{class:'cal-nav',style:{marginBottom:10}},
        r('button',{class:'cal-nav-btn',onClick:()=>{viewDate=new Date(y,m-1,1);draw()}},'‹'),
        r('div',{class:'cal-nav-title'},new Date(y,m).toLocaleDateString([],{month:'long',year:'numeric'})),
        r('button',{class:'cal-nav-btn',onClick:()=>{viewDate=new Date(y,m+1,1);draw()}},'›')
      );
      wrap.appendChild(nav);

      // Month filter chips
      const filterChips=r('div',{class:'sky-member-chips',style:{marginBottom:10}},
        r('button',{
          class:'sky-chip'+(S.calFilter==='all'?' active':''),
          style:S.calFilter==='all'?{background:'var(--accbg)',borderColor:'var(--accent)',color:'var(--accent)'}:{},
          onClick:()=>{S.calFilter='all';draw();}
        },'👨‍👩‍👧‍👦 Everyone'),
        ...S.users.map(u=>{
          const p=getUserPastel(u.user_id);
          const isOn=S.calFilter===u.user_id;
          return r('button',{
            class:'sky-chip'+(isOn?' active':''),
            style:isOn?{background:p.bg,borderColor:p.border,color:p.text}:{},
            onClick:()=>{S.calFilter=u.user_id;draw();}
          },r('span',{style:{fontSize:'.9rem'}},u.avatar),u.name);
        })
      );
      wrap.appendChild(filterChips);

      const grid=r('div',{class:'month-grid'},
        ...['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>r('div',{class:'month-hdr'},d)),
        ...Array.from({length:firstDay},()=>r('div',{class:'month-day other-month'})),
        ...Array.from({length:daysInMonth},(_,i)=>{
          const day=i+1;
          const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
          const tasks=S.tasks.filter(t=>normDate(t.due_date)===ds&&(S.calFilter==='all'||t.assigned_to===S.calFilter));
          const evts=S.events.filter(e=>normDate(e.start_date)===ds&&(S.calFilter==='all'||!e.assigned_to||e.assigned_to===''||e.assigned_to===S.calFilter));
          const cls='month-day'+(ds===tdStr?' today':'');
          return r('div',{class:cls,
            onClick:()=>{viewDate=new Date(y,m,day);S.calSelectedDate=new Date(y,m,day);mode='week';draw();}},
            r('div',{class:'mday-num'},day),
            ...evts.slice(0,2).map(ev=>{
              const u=ev.assigned_to?getUser(ev.assigned_to):null;
              const p=u?getUserPastel(u.user_id):{bg:'var(--accent)',border:'var(--accent)',text:'#fff'};
              return r('div',{style:{fontSize:'.6rem',fontWeight:700,background:p.bg,color:p.text,borderRadius:3,padding:'1px 4px',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ev.title);
            }),
            ...tasks.slice(0,evts.length>=2?0:2-evts.length).map(t=>{
              const u=getUser(t.assigned_to);
              const p=u?getUserPastel(u.user_id):{bg:'var(--bg2)',border:'var(--border)',text:'var(--text2)'};
              return r('div',{style:{fontSize:'.6rem',fontWeight:700,background:p.bg,color:p.text,borderRadius:3,padding:'1px 4px',marginBottom:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},catIcon(t.category)+' '+t.title);
            }),
            (evts.length+tasks.length)>2?r('div',{style:{fontSize:'.6rem',color:'var(--text3)',fontWeight:700}},
              '+'+(evts.length+tasks.length-2)+' more'
            ):null
          );
        })
      );
      wrap.appendChild(grid);
    }
  }

  const outer=r('div',{class:'anim-in'},r('div',{id:'cal-inner'}));
  setTimeout(draw,0);
  return outer;
}

// ── REWARDS VIEW ──
function buildRewards(){
  const kids=S.users.filter(u=>u.role==='child'||userPoints(u.user_id)>0).map(u=>({
    ...u,
    pts:userPoints(u.user_id),
    done:S.tasks.filter(t=>t.assigned_to===u.user_id&&t.status==='completed').length,
    todayPts:S.rewards.filter(r=>r.user_id===u.user_id&&r.date===todayStr()).reduce((s,r)=>s+(Number(r.points)||0),0),
  })).sort((a,b)=>b.pts-a.pts);

  const maxPts=Math.max(...kids.map(k=>k.pts),1);
  const leaderboard=kids.map((u,i)=>r('div',{class:'lb-item',style:i===0?{borderColor:'#F6C026'}:{}},
    r('div',{class:'lb-rank'},i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`),
    r('div',{class:'av av-md',style:{color:u.color,borderColor:u.color,background:u.color+'22'}},u.avatar),
    r('div',{style:{flex:1}},
      r('div',{style:{fontWeight:800,fontSize:'.92rem'}},u.name),
      r('div',{style:{fontSize:'.72rem',color:'var(--text3)'}},`${u.done} done · +${u.todayPts} today`),
      r('div',{class:'lb-bar'},r('div',{class:'pbar-fill',style:{width:`${Math.round(u.pts/maxPts*100)}%`,background:u.color,height:'100%'}}))
    ),
    r('span',{style:{background:'linear-gradient(135deg,#F6C026,#F5A623)',color:'#fff',padding:'5px 12px',borderRadius:99,fontWeight:800,fontSize:'.85rem',whiteSpace:'nowrap'}},`⭐ ${u.pts}`)
  ));

  const recent=[...S.rewards].sort((a,b)=>b.reward_id>a.reward_id?1:-1).slice(0,20).map(rw=>{
    const u=getUser(rw.user_id);
    return r('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--surface)',borderRadius:10,border:'1.5px solid var(--border)',marginBottom:7}},
      u?r('div',{class:'av av-sm',style:{color:u.color,borderColor:u.color,background:u.color+'22'}},u.avatar):null,
      r('div',{style:{flex:1}},
        r('div',{style:{fontWeight:800,fontSize:'.85rem'}},u?.name||''),
        r('div',{style:{fontSize:'.73rem',color:'var(--text3)'}},`${rw.reason} · ${rw.date}`)
      ),
      r('span',{style:{background:'linear-gradient(135deg,#F6C026,#F5A623)',color:'#fff',padding:'3px 10px',borderRadius:99,fontWeight:800,fontSize:'.78rem'}},`⭐ +${rw.points}`)
    );
  });

  return r('div',{class:'anim-in'},
    r('div',{class:'sh',style:{marginTop:4}},r('div',{class:'sh-title'},'⭐ Rewards')),
    ...leaderboard,
    r('div',{class:'sh'},r('div',{class:'sh-title'},'📜 Recent')),
    recent.length?r('div',{},...recent):r('div',{style:{color:'var(--text3)',textAlign:'center',padding:'24px 0'}},'No rewards yet')
  );
}

// ── KID MODE VIEW ──
function buildKidMode(){
  const u=S.currentUser;
  const td=todayStr();
  const myTasks=S.tasks.filter(t=>t.assigned_to===u.user_id&&t.due_date===td);
  const done=myTasks.filter(t=>t.status==='completed').length;
  const pct=myTasks.length?Math.round(done/myTasks.length*100):0;

  const header=r('div',{class:'kid-header',style:{background:`linear-gradient(135deg,${u.color},${u.color}BB)`}},
    r('div',{style:{fontSize:'2.8rem',marginBottom:6}},u.avatar),
    r('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'1.6rem',fontWeight:800}},`Hi, ${u.name}! 👋`),
    r('div',{style:{fontSize:'.85rem',opacity:.9,marginTop:3}},`${done}/${myTasks.length} done today 🎯`),
    r('div',{style:{marginTop:10,background:'rgba(255,255,255,.3)',borderRadius:99,height:10,overflow:'hidden'}},
      r('div',{style:{height:'100%',background:'#fff',borderRadius:99,width:`${pct}%`,transition:'width .5s'}})
    )
  );

  const cards=myTasks.map(task=>
    r('div',{class:`kid-card${task.status==='completed'?' done':''}`},
      r('div',{class:'kid-ico'},taskIcon(task.title)),
      r('div',{class:'kid-title'},task.title),
      task.due_time?r('div',{class:'kid-time'},`🕐 ${fmt12(task.due_time)}`):null,
      task.reward_points>0?r('div',{class:'kid-pts'},`⭐ ${task.reward_points} points!`):null,
      task.status==='completed'
        ?r('div',{style:{background:'var(--greenbg)',color:'var(--green)',borderRadius:10,padding:'11px',fontWeight:800,textAlign:'center'}},'✅ Done! Great job!')
        :r('button',{class:'kid-done-btn',onClick:async()=>{
          try{
            await API.completeTask(task.task_id);
            launchConfetti();showToast(`${task.reward_points>0?`⭐ +${task.reward_points} points! `:''}Great job!`);
            const data=await API.readAll();if(data){S.tasks=data.tasks||[];S.rewards=data.rewards||[];}
            renderContent();
          }catch(e){showToast(e.message,false);}
        }},'✅ Done!')
    )
  );

  if(!cards.length) return r('div',{},header,r('div',{style:{textAlign:'center',padding:'40px 24px'}},r('div',{style:{fontSize:'3.5rem',marginBottom:12}},'🎉'),r('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'1.4rem',fontWeight:800}},'All done!'),r('div',{style:{color:'var(--text3)',marginTop:6}},'Nothing left for today')));

  return r('div',{},header,r('div',{class:'kid-grid'},...cards));
}

// ═══════════════════════════════════════════════════════════════
// RENDER CONTENT
// ═══════════════════════════════════════════════════════════════
function renderContent(){
  // Kid mode check
  if(S.currentUser&&S.currentUser.role==='child'&&!S.isAdmin&&S.activeTab!=='rewards'&&S.activeTab!=='settings'){
    mount('content', buildKidMode());
    // Minimal kid bottom nav
    const nav=r('nav',{class:'bottomnav'},
      r('button',{class:`navitem${S.activeTab==='home'?' on':''}`,onClick:()=>{S.activeTab='home';renderContent()}},r('span',{class:'navico'},'🏠'),'Tasks'),
      r('button',{class:`navitem${S.activeTab==='rewards'?' on':''}`,onClick:()=>{S.activeTab='rewards';renderContent()}},r('span',{class:'navico'},'⭐'),'Rewards'),
      r('button',{class:`navitem${S.activeTab==='settings'?' on':''}`,onClick:()=>{S.activeTab='settings';renderContent()}},r('span',{class:'navico'},'⚙️'),'Settings')
    );
    mount('bottomnav-mount',nav);
    // FAB hidden in kid mode
    const existingFab=document.querySelector('.fab');if(existingFab)existingFab.remove();
    return;
  }

  let view;
  switch(S.activeTab){
    case 'home':     view=buildHome(); break;
    case 'tasks':    view=buildTasks(); break;
    case 'calendar': view=buildCalendarFull(); break;
    case 'routines': view=buildRoutines(); break;
    case 'rewards':  view=buildRewards(); break;
    case 'settings': view=buildSettings(); break;
    default:         view=buildHome();
  }
  mount('content', view);
  renderBottomNav();

  // FAB
  const existingFab=document.querySelector('.fab');if(existingFab)existingFab.remove();
  if(S.isAdmin&&(S.activeTab==='home'||S.activeTab==='tasks')){
    const fab=r('button',{class:'fab',onClick:()=>openTaskModal(),title:'Add Task'},'+');
    document.getElementById('app').appendChild(fab);
  }
}

function renderAll(){
  renderTopBar();
  renderContent();
}

// ═══════════════════════════════════════════════════════════════
// LOADING SCREEN
// ═══════════════════════════════════════════════════════════════
function showLoading(){
  mount('content', r('div',{class:'loading'},
    r('div',{class:'loading-ico'},'🏠'),
    r('div',{style:{fontFamily:"'DM Sans',sans-serif",fontSize:'1.2rem',fontWeight:800}},'Loading Home Hub…'),
    r('div',{style:{fontSize:'.82rem',color:'var(--text3)'}},'Connecting to your family data')
  ));
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
// Restore preferences
try{
  const p=localStorage.getItem('hh_palette'); if(p) document.documentElement.setAttribute('data-palette',p);
  const sf=localStorage.getItem('hh_surface'); if(sf) document.documentElement.setAttribute('data-surface',sf);
  const d=localStorage.getItem('hh_dark'); if(d==='1'){ S.isDark=true; document.documentElement.setAttribute('data-dark',''); }
}catch(e){}
renderTopBar();
renderBottomNav();
showLoading();
loadData();
// Recalculate calendar height on window resize
window.addEventListener('resize', ()=>{
  if(S.activeTab==='home'||S.activeTab==='calendar') renderContent();
});

setInterval(async()=>{
  if(!S.loading){
    try{
      const data=await API.readAll();
      if(data){S.tasks=data.tasks||[];S.events=data.events||[];S.rewards=data.rewards||[];}
      renderContent();
    }catch(e){}
  }
}, CONFIG.REFRESH_MS);
</script>
</body>
</html>
